[build]
  publish = "."
  command = "echo 'Business Lab static site ready for deployment'"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/partner-portal"
  to = "/partner-portal.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms-of-service.html"
  status = 200

[[redirects]]
  from = "/investors"
  to = "/investors.html"
  status = 200

[[redirects]]
  from = "/switch"
  to = "/switch.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/signup.html"
  status = 200

[[redirects]]
  from = "/payment-confirmed"
  to = "/payment-confirmed.html"
  status = 200

[[redirects]]
  from = "/get-started"
  to = "/get-started.html"
  status = 200

[[redirects]]
  from = "/tenant-dashboard"
  to = "/tenant-dashboard.html"
  status = 200

# Offerings & contracts
[[redirects]]
  from = "/offerings"
  to = "/offerings.html"
  status = 200

[[redirects]]
  from = "/contracts/service-agreement"
  to = "/contracts/service-agreement.html"
  status = 200

[[redirects]]
  from = "/contracts/welcome-letter"
  to = "/contracts/welcome-letter.html"
  status = 200

[[redirects]]
  from = "/admin/contract-generator"
  to = "/admin/contract-generator.html"
  status = 200

# Catch-all redirect for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  ENVIRONMENT = "production"

[context.deploy-preview.environment]
  ENVIRONMENT = "staging"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://assets.calendly.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://calendly.com https://formsubmit.co; frame-src https://calendly.com"

# Cache static assets
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"